version: 2

models:
  - name: int_deal_stage_history
    description: >
      Historical record of when each deal entered each pipeline stage.
      Combines stage changes from deal_changes with initial deal creations.
    columns:
      - name: deal_id
        description: Deal identifier
      - name: entered_stage_at
        description: Timestamp when deal entered this stage
      - name: stage_id
        description: Pipeline stage ID
      - name: stage_name
        description: Pipeline stage name
      - name: funnel_step
        description: Funnel step number (1-9)
      - name: kpi_name
        description: KPI name for the funnel step

  - name: int_deal_activities
    description: >
      Deal activities (Sales Calls) mapped to funnel steps.
      Sales Call 1 (meeting) maps to Step 2.1, Sales Call 2 (sc_2) maps to Step 3.1.
    columns:
      - name: activity_id
        description: Unique activity identifier
      - name: deal_id
        description: Associated deal ID
      - name: activity_type_key
        description: Activity type key (meeting, sc_2)
      - name: activity_type_name
        description: Activity type display name
      - name: assigned_user_id
        description: User ID of assigned sales rep
      - name: is_done
        description: Whether activity is completed
      - name: activity_timestamp
        description: Activity due date/time
      - name: funnel_step
        description: Funnel step number (2.1 or 3.1)
      - name: kpi_name
        description: KPI name (Sales Call 1 or Sales Call 2)
