version: 2

models:
  - name: stg_stages
    description: Cleaned pipeline stage definitions
    columns:
      - name: stage_id
        description: Stage identifier
        tests:
          - unique
          - not_null
      - name: stage_name
        description: Stage display name

  - name: stg_activity_types
    description: Cleaned activity type definitions
    columns:
      - name: activity_type_id
        description: Activity type identifier
        tests:
          - unique
          - not_null
      - name: activity_type_name
        description: Display name (Sales Call 1, Sales Call 2, etc.)
      - name: activity_type_key
        description: Type key (meeting, sc_2, etc.)
      - name: is_active
        description: Whether this type is currently active

  - name: stg_users
    description: Cleaned user data
    columns:
      - name: user_id
        description: User identifier
        tests:
          - unique
          - not_null
      - name: user_name
        description: User display name
      - name: user_email
        description: User email
      - name: modified_at
        description: Last modification timestamp

  - name: stg_activity
    description: Cleaned activity records
    columns:
      - name: activity_id
        description: Unique activity identifier
      - name: activity_type_key
        description: Activity type key (meeting, sc_2, etc.)
      - name: assigned_user_id
        description: User ID of assigned sales rep
      - name: deal_id
        description: Associated deal ID
      - name: is_done
        description: Whether activity is completed
      - name: due_at
        description: Due date/time for the activity

  - name: stg_deal_changes
    description: Cleaned deal change history
    columns:
      - name: deal_id
        description: Deal identifier
      - name: changed_at
        description: Timestamp of the change
      - name: changed_field_key
        description: Field that was changed
      - name: new_value
        description: New value after the change

  - name: stg_fields
    description: Cleaned field definitions
    columns:
      - name: field_id
        description: Field ID
        tests:
          - unique
          - not_null
      - name: field_key
        description: Field key identifier
      - name: field_name
        description: Display name
      - name: field_value_options
        description: JSON options for the field
